[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # This allows your site to communicate with Supabase while remaining secure
    Content-Security-Policy = "default-src 'self'; connect-src 'self' https://ohkswkuenwbntukkmxso.supabase.co;"
